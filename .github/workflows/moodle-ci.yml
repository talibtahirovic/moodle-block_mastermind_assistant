name: moodle-plugin-ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-22.04

    services:
      postgres:
        # Moodle 5.0+ requires Postgres 15. Postgres 16 covers the entire matrix
        # (older Moodle versions accept newer Postgres).
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_HOST_AUTH_METHOD: trust
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 8

    strategy:
      fail-fast: false
      matrix:
        include:
          - moodle-branch: 'MOODLE_404_STABLE'
            php: '8.1'
            database: 'pgsql'
          - moodle-branch: 'MOODLE_405_STABLE'
            php: '8.1'
            database: 'pgsql'
          - moodle-branch: 'MOODLE_500_STABLE'
            php: '8.2'
            database: 'pgsql'
          - moodle-branch: 'MOODLE_501_STABLE'
            php: '8.2'
            database: 'pgsql'
          # MOODLE_502_STABLE temporarily disabled: moodle-plugin-ci ^4 ships
          # nikic/php-parser v4 which fatals parsing some PHP 8.3 syntax used
          # by Moodle 5.2 core. Re-enable when moodle-plugin-ci ^5 lands with
          # php-parser v5 support.
          # - moodle-branch: 'MOODLE_502_STABLE'
          #   php: '8.3'
          #   database: 'pgsql'

    steps:
      - name: Checkout plugin
        uses: actions/checkout@v4
        with:
          path: plugin

      - name: Setup PHP ${{ matrix.php }}
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: mbstring, pgsql, zip, gd, soap, intl, xml, xmlrpc
          ini-values: max_input_vars=5000
          coverage: none

      - name: Initialise moodle-plugin-ci
        run: |
          composer create-project -n --no-dev --prefer-dist moodlehq/moodle-plugin-ci ci ^4
          echo $(cd ci/bin; pwd) >> "$GITHUB_PATH"
          echo $(cd ci/vendor/bin; pwd) >> "$GITHUB_PATH"
          sudo locale-gen en_AU.UTF-8
          echo "NVM_DIR=$HOME/.nvm" >> "$GITHUB_ENV"

      - name: Install Moodle and the plugin
        run: moodle-plugin-ci install --plugin ./plugin --db-host=127.0.0.1
        env:
          DB: ${{ matrix.database }}
          MOODLE_BRANCH: ${{ matrix.moodle-branch }}

      - name: PHP Lint
        if: ${{ !cancelled() }}
        run: moodle-plugin-ci phplint

      - name: PHP Copy/Paste Detector
        if: ${{ !cancelled() }}
        run: moodle-plugin-ci phpcpd

      - name: PHP Mess Detector
        if: ${{ !cancelled() }}
        run: moodle-plugin-ci phpmd

      - name: Moodle Code Checker
        if: ${{ !cancelled() }}
        run: moodle-plugin-ci codechecker --max-warnings 0

      - name: Moodle PHPDoc Checker
        if: ${{ !cancelled() }}
        run: moodle-plugin-ci phpdoc

      - name: Validating
        if: ${{ !cancelled() }}
        run: moodle-plugin-ci validate

      - name: Check upgrade savepoints
        if: ${{ !cancelled() }}
        run: moodle-plugin-ci savepoints

      - name: Mustache Lint
        if: ${{ !cancelled() }}
        run: moodle-plugin-ci mustache

      - name: Grunt
        if: ${{ !cancelled() }}
        run: moodle-plugin-ci grunt --max-lint-warnings 0

      - name: PHPUnit tests
        if: ${{ !cancelled() }}
        run: moodle-plugin-ci phpunit

      - name: Behat features
        if: ${{ !cancelled() }}
        run: moodle-plugin-ci behat --profile chrome
